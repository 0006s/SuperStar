name: 刷课

    
jobs: 
  Start:
    runs-on: ubuntu-latest # 在最新版本的 Ubuntu 操作系统环境下运行
    steps: # 要执行的步骤
      - name: 拷贝代码
        uses: actions/checkout@v3  # 用于将github代码仓库的代码拷贝到工作目录中

      - name: 设置python环境
        uses: actions/setup-python@v4 # 顺手帮你升级了 actions 版本，v2太老容易报错
        with:
          python-version: '3.10'  # 帮你改成了评论区反馈最稳妥的 3.10 版本

      - name: 安装依赖包
        run: | # 安装依赖包
          pip install -r ./requirements.txt 
          
      - name: Run main.py
        run: python main.py -u 15913967901 -p sz070610 -l 260970199 #课程id，默认为心理课的
