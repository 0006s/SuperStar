name: 刷课

on: 
  push:
    branches: [ main ]
  # schedule:
  #   - cron: "0 8 * * *" 
    
jobs: 
  Start:
    runs-on: ubuntu-latest 
    steps: 
      - name: 拷贝代码
        uses: actions/checkout@v4  

      - name: 设置python环境
        uses: actions/setup-python@v5 
        with:
          python-version: '3.13'  # 🌟 关键修改：升级到 3.13 以支持脚本的新特性

      - name: 安装依赖包
        run: | 
          pip install -r ./requirements.txt 
          
      - name: Run main.py
        run: python main.py -u 15913967901 -p sz070610 -l 242344372
